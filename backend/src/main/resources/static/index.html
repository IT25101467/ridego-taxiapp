<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiApp Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: white; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .nav-link { color: #aaa; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <h1 class="mb-4 text-primary">🚖 TaxiApp Control Center</h1>

    <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="pills-passenger-tab" data-bs-toggle="pill" data-bs-target="#passenger">Passenger</button></li>
        <li class="nav-item"><button class="nav-link" id="pills-admin-tab" data-bs-toggle="pill" data-bs-target="#admin" onclick="loadPendingRides()">Admin</button></li>
        <li class="nav-item"><button class="nav-link" id="pills-driver-tab" data-bs-toggle="pill" data-bs-target="#driver">Driver</button></li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="passenger">
            <div class="card p-4 shadow">
                <h3>Request a Ride</h3>
                <div class="mb-3">
                    <label>Pickup Location</label>
                    <input type="text" id="pickup" class="form-control bg-dark text-white">
                </div>
                <div class="mb-3">
                    <label>Dropoff Location</label>
                    <input type="text" id="dropoff" class="form-control bg-dark text-white">
                </div>
                <button class="btn btn-primary" onclick="requestRide()">Book Now</button>
            </div>
        </div>

        <div class="tab-pane fade" id="admin">
            <div class="card p-4 shadow">
                <h3>Pending Requests</h3>
                <table class="table table-dark table-striped mt-3">
                    <thead><tr><th>ID</th><th>From</th><th>To</th><th>Action</th></tr></thead>
                    <tbody id="pending-table"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="driver">
            <div class="card p-4 shadow">
                <h3>Active Jobs</h3>
                <div id="active-jobs-list">
                    <p class="text-muted">No active jobs assigned yet.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_BASE = "http://localhost:8080/api/bookings";

    // PASSENGER: POST Request
    async function requestRide() {
        const data = {
            passengerId: "P-001",
            pickupLocation: document.getElementById('pickup').value,
            dropoffLocation: document.getElementById('dropoff').value,
            distanceInKm: 10.0 // Hardcoded for now
        };

        const response = await fetch(`${API_BASE}/request`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        alert(await response.text());
    }

    // ADMIN: GET Pending Rides
    async function loadPendingRides() {
        const response = await fetch(`${API_BASE}/pending`);
        const rides = await response.json();
        const table = document.getElementById('pending-table');
        table.innerHTML = rides.map(r => `
                <tr>
                    <td>${r.bookingId}</td>
                    <td>${r.pickupLocation}</td>
                    <td>${r.dropoffLocation}</td>
                    <td><button class="btn btn-sm btn-success" onclick="assignDriver('${r.bookingId}')">Assign Driver D-01</button></td>
                </tr>
            `).join('');
    }

    // ADMIN: PUT Assign Driver
    async function assignDriver(id) {
        await fetch(`${API_BASE}/assign/${id}?driverId=D-01`, { method: 'PUT' });
        alert("Driver Assigned!");
        loadPendingRides();
    }
</script>
</body>
</html>
